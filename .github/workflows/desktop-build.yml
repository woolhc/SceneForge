name: Desktop Build

on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-24.04, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux desktop build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake curl git libayatana-appindicator3-dev \
            librsvg2-dev libssl-dev libwebkit2gtk-4.1-dev patchelf

      - name: Build portable macOS whisper sidecar
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch v1.7.6 https://github.com/ggerganov/whisper.cpp "$RUNNER_TEMP/whisper.cpp"
          cmake -S "$RUNNER_TEMP/whisper.cpp" -B "$RUNNER_TEMP/whisper.cpp/build" \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=ON
          cmake --build "$RUNNER_TEMP/whisper.cpp/build" --config Release --target whisper-cli --parallel 2
          echo "SCENEFORGE_WHISPER_BIN=$RUNNER_TEMP/whisper.cpp/build/bin/whisper-cli" >> "$GITHUB_ENV"

      - name: Build portable Linux whisper sidecar
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth 1 --branch v1.7.6 https://github.com/ggerganov/whisper.cpp "$RUNNER_TEMP/whisper.cpp"
          cmake -S "$RUNNER_TEMP/whisper.cpp" -B "$RUNNER_TEMP/whisper.cpp/build" \
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=ON
          cmake --build "$RUNNER_TEMP/whisper.cpp/build" --config Release --target whisper-cli --parallel 2
          echo "SCENEFORGE_WHISPER_BIN=$RUNNER_TEMP/whisper.cpp/build/bin/whisper-cli" >> "$GITHUB_ENV"

      - name: Build portable Windows whisper sidecar
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git clone --depth 1 --branch v1.7.6 https://github.com/ggerganov/whisper.cpp "$env:RUNNER_TEMP\whisper.cpp"
          cmake -S "$env:RUNNER_TEMP\whisper.cpp" -B "$env:RUNNER_TEMP\whisper.cpp\build" -A x64 `
            -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_TESTS=OFF -DWHISPER_BUILD_EXAMPLES=ON
          cmake --build "$env:RUNNER_TEMP\whisper.cpp\build" --config Release --target whisper-cli --parallel 2
          $whisper = Get-ChildItem "$env:RUNNER_TEMP\whisper.cpp\build" -Recurse -Filter whisper-cli.exe | Select-Object -First 1 -ExpandProperty FullName
          "SCENEFORGE_WHISPER_BIN=$whisper" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install frontend dependencies
        run: npm ci

      - name: Stage target sidecars
        run: npm run prepare:sidecars

      - name: Test application
        run: npm run test:ts

      - name: Fetch Rust dependencies
        working-directory: src-tauri
        run: cargo fetch --locked

      - name: Test Rust backend
        working-directory: src-tauri
        run: cargo test --locked

      - name: Build Tauri bundle
        run: npm run tauri:build

      - name: Upload native installers
        uses: actions/upload-artifact@v4
        with:
          name: sceneforge-${{ runner.os }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error
